<!DOCTYPE html>
<html>
<head>
    <title>PawSome Chat Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; padding: 5px; border-radius: 5px; }
        .sent { background: #e3f2fd; text-align: right; }
        .received { background: #f5f5f5; }
        .typing { color: #888; font-style: italic; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; }
        .config { background: #ffe; padding: 10px; margin-bottom: 20px; border: 1px solid #dd6; }
        .status { padding: 10px; margin-bottom: 10px; background: #e8f5e9; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🐾 PawSome Chat Test</h1>
    
    <div class="config">
        <h3>Configuration</h3>
        <label>Match ID: <input type="text" id="matchId" placeholder="uuid" style="width: 300px;"></label><br><br>
        <label>JWT Token: <input type="text" id="token" placeholder="your-access-token" style="width: 500px;"></label><br><br>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>

    <div class="status" id="status">Not connected</div>
    
    <div id="messages"></div>
    
    <div>
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let ws = null;
        let myPetId = null;

        function connect() {
            const matchId = document.getElementById('matchId').value;
            const token = document.getElementById('token').value;
            
            if (!matchId || !token) {
                alert('Please enter Match ID and Token');
                return;
            }

            const wsUrl = `ws://localhost:8000/chat/ws/${matchId}?token=${token}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('status').textContent = '✅ Connected';
                document.getElementById('status').style.background = '#e8f5e9';
                addSystemMessage('Connected to chat');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('Received:', data);

                if (data.type === 'message') {
                    const msg = data.data;
                    if (!myPetId) {
                        // First message shows who we are
                        myPetId = msg.sender_pet_id;
                    }
                    const isSent = msg.sender_pet_id === myPetId;
                    addMessage(msg.content, isSent);
                } else if (data.type === 'typing') {
                    showTyping(data.data.is_typing);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addSystemMessage('Error: ' + error.message);
            };

            ws.onclose = () => {
                document.getElementById('status').textContent = '❌ Disconnected';
                document.getElementById('status').style.background = '#ffebee';
                addSystemMessage('Disconnected from chat');
                ws = null;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content || !ws) return;

            const message = {
                type: 'message',
                content: content,
                msg_type: 'text'
            };

            ws.send(JSON.stringify(message));
            input.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(content, isSent) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isSent ? 'sent' : 'received');
            msgDiv.textContent = content;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(content) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message typing';
            msgDiv.textContent = '⚙️ ' + content;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping(isTyping) {
            // Show typing indicator (simplified)
            if (isTyping) {
                console.log('Other user is typing...');
            }
        }
    </script>
</body>
</html>
